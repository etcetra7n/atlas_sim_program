<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Atlas Simulator Program</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: Arial, Helvetica, sans-serif;
        }

        canvas {
            display: block;
        }

        #overlay {
            position: absolute;
            top: 16px;
            left: 16px;
            color: white;
            background: rgba(0, 0, 0, 0.45);
            padding: 12px 16px;
            border-radius: 8px;
            user-select: none;
            z-index: 10;
        }

        #overlay h2 {
            margin-bottom: 8px;
            font-size: 18px;
        }

        #overlay p {
            margin: 4px 0;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div id="overlay">
        <h2>Atlas Simulator Program</h2>
        <p>W / S : Forward / Reverse</p>
        <p>A / D : Turn Left / Right</p>
        <p>Mouse : Orbit (before rover loads)</p>
    </div>

    <script type="module" src="/src/main.js"></script>

</body>
</html>
